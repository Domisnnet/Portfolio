<div class="loader-container">
  <svg 
    class="loader-svg" 
    viewBox="0 0 120 120" 
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <radialGradient id="aura" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="var(--brand-accent)" stop-opacity="var(--op-low)" />
        <stop offset="100%" stop-color="var(--brand-accent)" stop-opacity="var(--op-hidden)" />
      </radialGradient>
    </defs>
    <circle cx="60" cy="60" r="50" fill="url(#aura)">
      <animate attributeName="r" values="45;55;45" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="60" cy="60" r="30" class="loader-bg-circle" stroke="var(--brand-accent)" stroke-width="3" />
    <text 
      x="60" y="68" 
      text-anchor="middle" 
      class="loader-text-icon"
    >
      &lt;/&gt;
    </text>
  </svg>
</div>
