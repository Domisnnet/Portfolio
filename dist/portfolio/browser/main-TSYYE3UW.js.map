@if (!isSilent()) {
  <header class="main-header" data-cosmic-effects="silent">
    <div class="nav-container">
      <a routerLink="/" class="logo">
        <span class="logo-dot-img">
          <img class="logo-dot-img" src="assets/images/logo-domisdev.png" alt="">
        </span>
        <span class="logo-text">DomisDev</span>
      </a>
      <nav class="nav-links" [class.open]="menuOpen()">
        <a routerLink="/">Home</a>
        <a routerLink="/projects">Projetos</a>
        <app-button
          [routerLink]="['/contact']"
          variant="outline"
        >
          Contato
        </app-button>
      </nav>
      <div class="header-actions">
        <app-theme-toggle />   
        <button
          type="button"
          class="hamburger-menu outline"
          (click)="toggleMenu()"
        >
          ☰
        </button>
      </div>
    </div>
  </header>
}
